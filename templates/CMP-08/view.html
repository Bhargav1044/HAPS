<div class="form-wrapper">
  <!-- HEADER -->
  <div class="table-header">
    <h2>CMP-08 Records</h2>

    <div class="header-actions">
      <input type="text" id="searchInput" placeholder="Search..." />
      <button id="refreshBtn" onclick="resetFilters()">
        <i class="fas fa-rotate"></i>
      </button>
    </div>
  </div>

  <!-- FILTER BAR (SINGLE LINE UI) -->
  <div class="filter-bar">
    <!-- ARN FILTER -->
    <div class="filter-group">
      <label>CMP-08 Status</label>
      <select id="arnFilter">
        <option value="">All</option>
        <option value="filled">Filled</option>
        <option value="empty">Empty</option>
      </select>
    </div>

    <!-- QUARTER FILTER -->
    <div class="filter-group">
      <label>Quarter</label>
      <select id="quarterFilter">
        <option value="">All</option>
        <option>Apr - Jun 2026</option>
        <option>Jul - Sep 2026</option>
        <option>Oct - Dec 2026</option>
        <option>Jan - Mar 2027</option>
      </select>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GST No</th>
          <th>ID</th>
          <th>Password</th>
          <th>Concern Person</th>
          <th>Contact No</th>
          <th>Email ID</th>
          <th>Periodicity</th>
          <th>Quarter</th>
          <th>CMP-08 ARN No.</th>
          <th>CMP-08 Filing Date</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <tr>
          <td colspan="11" class="loading">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<style>
  .form-wrapper {
    padding: 15px;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .header-actions input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    width: 220px;
  }

  .header-actions button {
    background: #27334d;
    color: white;
    border-radius: 10px;
    border: none;
    padding: 10px;
    cursor: pointer;
  }

  /* 🔥 NEW ANIMATION */
  #refreshBtn i {
    transition: transform 0.5s ease;
  }

  #refreshBtn.loading i {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    font-size: 13px;
  }

  .filter-group select {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    min-width: 160px;
  }

  .table-container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    border-radius: 16px;
    max-height: 420px;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    position: sticky;
    top: 0;
    background: rgba(255, 255, 255, 0.95);
    color: #27334d;
    font-weight: 700;
    padding: 12px;
  }

  td {
    padding: 10px;
  }

  tr:hover {
    background: rgba(37, 99, 235, 0.08);
  }

  .loading {
    text-align: center;
  }

  .null {
    color: white;
    background: #e11d48;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
  }
</style>

<script>
  (function () {
    let data = [];

    function formatEmail(email) {
      if (!email) return "";
      email = email.toLowerCase().trim();
      if (!email.endsWith("@gmail.com")) {
        email = email.split("@")[0] + "@gmail.com";
      }
      return email;
    }

    function applyFilters() {
      let filtered = [...data];

      const search = document.getElementById("searchInput").value.toLowerCase();
      const quarter = document.getElementById("quarterFilter").value;
      const arnFilter = document.getElementById("arnFilter").value;

      if (arnFilter === "empty") {
        filtered = filtered.filter((d) => !d.arn || !d.date);
      }

      if (arnFilter === "filled") {
        filtered = filtered.filter((d) => d.arn && d.date);
      }

      if (quarter) {
        filtered = filtered.filter((d) => d.quarter === quarter);
      }

      if (search) {
        filtered = filtered.filter((d) =>
          Object.values(d).join(" ").toLowerCase().includes(search),
        );
      }

      renderTable(filtered);
    }

    function renderTable(rows) {
      const body = document.getElementById("tableBody");

      if (rows.length === 0) {
        body.innerHTML = `<tr><td colspan="11">No Data Found</td></tr>`;
        return;
      }

      body.innerHTML = rows
        .map(
          (r) => `
      <tr>
        <td>${r.name}</td>
        <td>${r.gst || "-"}</td>
        <td>${r.id}</td>
        <td>${r.password}</td>
        <td>${r.concern}</td>
        <td>${r.contact}</td>
        <td>${r.email}</td>
        <td>${r.periodicity}</td>
        <td>${r.quarter}</td>
        <td>${r.arn ? r.arn : '<span class="null">NULL</span>'}</td>
        <td>${r.date ? r.date : '<span class="null">NULL</span>'}</td>
        ${
          window.isAdmin
            ? `<td><button style="background:#e11d48;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;" onclick="deleteRecord('${r.db_id}','cmp')">Delete</button></td>`
            : ""
        }
      </tr>
    `,
        )
        .join("");
    }

    async function loadRows() {
      const response = await fetch("/api/cmp/list");
      const result = await response.json();

      data = (result.data || []).map((row) => ({
        db_id: row.id,
        name: row.name || "-",
        gst: row.gst_no || "",
        id: row.user_id || "-",
        password: row.password || "-",
        concern: row.concern_person || "-",
        contact: row.contact_no || "-",
        email: formatEmail(row.email_id),
        periodicity: row.periodicity || "-",
        quarter: row.quarter || "-",
        arn: row.cmp08_arn_no || "",
        date: row.cmp08_filing_date || "",
      }));

      renderTable(data);
    }

    window.resetFilters = async function () {
      const btn = document.getElementById("refreshBtn");

      // 🔥 START ANIMATION
      btn.classList.add("loading");

      document.getElementById("searchInput").value = "";
      document.getElementById("quarterFilter").value = "";
      document.getElementById("arnFilter").value = "";

      await loadRows();

      // 🔥 STOP ANIMATION
      setTimeout(() => {
        btn.classList.remove("loading");
      }, 600);
    };

    document
      .getElementById("searchInput")
      .addEventListener("input", applyFilters);
    document
      .getElementById("quarterFilter")
      .addEventListener("change", applyFilters);
    document
      .getElementById("arnFilter")
      .addEventListener("change", applyFilters);

    loadRows();
  })();
</script>
