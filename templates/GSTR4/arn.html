<div class="form-wrapper">
  <div class="form-container">
    <form id="gstr4Form">
      <div class="form-grid">
        <div class="form-group">
          <label>GST No</label>
          <div class="input-box">
            <i class="fas fa-id-card"></i>
            <input id="gst" maxlength="15" required pattern="[0-9A-Z]{15}" />
          </div>
        </div>

        <div class="form-group">
          <label>GSTR4 ARN</label>
          <div class="input-box dropdown">
            <i class="fas fa-list"></i>
            <select id="arnSelect" required>
              <option disabled selected>Select ARN Status</option>
              <option>Filed by Client</option>
              <option>Client Exited</option>
              <option>Cancelled</option>
              <option>NA</option>
              <option value="manual">Enter Manually</option>
            </select>
          </div>
          <div class="input-box" id="manualArnBox" style="display: none; margin-top: 8px">
            <i class="fas fa-keyboard"></i>
            <input id="manualArn" placeholder="Enter ARN Number" />
          </div>
        </div>

        <div class="form-group">
          <label>Filing Date</label>
          <div class="input-box">
            <i class="fas fa-calendar-day"></i>
            <input id="filingDate" type="date" required />
          </div>
        </div>
      </div>

      <button class="form-btn" type="submit">Update</button>
    </form>
    <p id="gstr4Message" style="margin-top: 10px; font-weight: 600"></p>
  </div>
</div>

<style>
  .form-wrapper {
    padding: 20px;
  }

  .form-container {
    width: 100%;
    max-width: 800px;
    margin: auto;
    padding: 25px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.25);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-group label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .input-box {
    position: relative;
    display: flex;
    align-items: center;
    border-radius: 8px;
    padding-left: 35px;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.35);
  }

  .input-box i {
    position: absolute;
    left: 10px;
    color: #6b7280;
  }

  .input-box input,
  .input-box select {
    width: 100%;
    padding: 10px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    color: #111;
  }

  .input-box select {
    appearance: none;
    cursor: pointer;
  }

  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
  }

  .form-btn {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #27334d;
    color: white;
    font-weight: 600;
    width: 120px;
  }

  @media (max-width: 768px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  (function () {
    const arnSelect = document.getElementById("arnSelect");
    const manualArnBox = document.getElementById("manualArnBox");
    const manualArn = document.getElementById("manualArn");
    const form = document.getElementById("gstr4Form");
    const message = document.getElementById("gstr4Message");

    arnSelect.addEventListener("change", () => {
      if (arnSelect.value === "manual") {
        manualArnBox.style.display = "flex";
        manualArn.required = true;
      } else {
        manualArnBox.style.display = "none";
        manualArn.required = false;
        manualArn.value = "";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const gst = document.getElementById("gst").value.trim().toUpperCase();
      if (!/^[0-9A-Z]{15}$/.test(gst)) {
        alert("GST must be 15 uppercase alphanumeric");
        return;
      }

      const arnValue = arnSelect.value === "manual" ? manualArn.value.trim() : arnSelect.value;
      const response = await fetch("/api/gstr4/update-arn", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          gst_no: gst,
          arn: arnValue,
          date: document.getElementById("filingDate").value,
        }),
      });

      const result = await response.json();
      if (response.ok) {
        message.textContent = "Updated successfully";
        message.style.color = "#166534";
      } else {
        message.textContent = result.error || "Update failed";
        message.style.color = "#b91c1c";
      }
    });
  })();
</script>
