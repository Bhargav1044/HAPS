<div class="form-wrapper">
  <!-- HEADER -->
  <div class="table-header">
    <h2>GSTR4 Records</h2>

    <div class="header-actions">
      <input type="text" id="searchInput" placeholder="Search..." />
      <button id="refreshBtn" onclick="resetFilters()">
        <i class="fas fa-rotate"></i>
      </button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <!-- ARN STATUS FILTER -->
    <div class="filter-group">
      <label>GSTR4 Status</label>
      <select id="arnFilter">
        <option value="">All</option>
        <option value="filled">Filled</option>
        <option value="empty">Empty</option>
      </select>
    </div>

    <!-- YEAR FILTER -->
    <div class="filter-group">
      <label>Filing Year</label>
      <select id="yearFilter">
        <option value="">All</option>
        <option>2026</option>
        <option>2027</option>
      </select>
    </div>
  </div>

  <!-- EXPORT / IMPORT BAR -->
  <div class="action-bar">
    <button class="action-btn export-btn" onclick="exportToExcel()">
      <i class="fas fa-file-excel"></i> Export to Excel
    </button>
    <button class="action-btn import-btn" onclick="document.getElementById('importFile').click()">
      <i class="fas fa-upload"></i> Import Excel
    </button>
    <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none" onchange="importFromExcel(event)" />
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GST No</th>
          <th>ID</th>
          <th>Password</th>
          <th>Concern</th>
          <th>Contact</th>
          <th>Email</th>
          <th>Periodicity</th>
          <th>GSTR4 ARN</th>
          <th>GSTR4 Filing Date</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <tr>
          <td colspan="10" class="loading">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ================= STYLE ================= -->

    padding: 15px;

    justify-content: space-between;
    margin-bottom: 15px;

  }

  .filter-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;

    font-size: 13px;
  }

  .filter-group select {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    min-width: 160px;
  }

  /* ACTION BAR */
  .action-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: none;

    cursor: pointer;

<!-- SheetJS for Excel export/import -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<!-- ================= SCRIPT ================= -->
<script>
  (function () {
    let data = [];

    function applyFilters() {
      let filtered = [...data];

      const search = document.getElementById("searchInput").value.toLowerCase();
      const year = document.getElementById("yearFilter").value;
      const arnFilter = document.getElementById("arnFilter").value;

      if (arnFilter === "empty") {
        filtered = filtered.filter((d) => !d.gstr4arn || !d.gstr4date);
      }

      if (arnFilter === "filled") {
        filtered = filtered.filter((d) => d.gstr4arn && d.gstr4date);
      }

      if (year) {
        filtered = filtered.filter(
          (d) => d.gstr4date && d.gstr4date.includes(year),
        );
      }

      if (search) {
        filtered = filtered.filter((d) =>
          Object.values(d).join(" ").toLowerCase().includes(search),
        );
      }

      renderTable(filtered);
    }

    function renderTable(rows) {
      const body = document.getElementById("tableBody");

      if (rows.length === 0) {
        body.innerHTML = `<tr><td colspan="11">No Data Found</td></tr>`;
        return;
      }

      body.innerHTML = rows
        .map(
          (r) => `
      <tr>
        <td>${r.name}</td>
        <td>${r.gst || "-"}</td>
        <td>${r.id}</td>
        <td>${r.password}</td>
        <td>${r.concern}</td>
        <td>${r.contact}</td>
        <td>${r.email}</td>
        <td>${r.periodicity}</td>

        <td>${r.gstr4arn ? r.gstr4arn : '<span class="null">NULL</span>'}</td>
        <td>${r.gstr4date ? r.gstr4date : '<span class="null">NULL</span>'}</td>

        ${
          window.isAdmin
            ? `
        <td>
          <button style="background:#e11d48;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;"
          onclick="deleteRecord('${r.db_id}','gstr4')">Delete</button>
        </td>`
            : ""
        }
      </tr>
    `,
        )
        .join("");
    }

    async function loadRows() {
      if (window.isAdmin && !document.getElementById("actionTh")) {
        const theadTr = document.querySelector("table thead tr");
        if (theadTr) theadTr.innerHTML += '<th id="actionTh">Action</th>';
      }

      const response = await fetch("/api/gstr4/list");
      const result = await response.json();

      data = (result.data || []).map((row) => ({
        db_id: row.id,
        name: row.name || "-",
        gst: row.gst_no || "",
        id: row.user_id || "-",
        password: row.password || "-",
        concern: row.concern_person || "-",
        contact: row.contact_no || "-",
        email: row.email_id || "-",
        periodicity: row.periodicity || "-",
        gstr4arn: row.gstr4_arn_no || "",
        gstr4date: row.gstr4_filing_date || "",
      }));

      // Sort ascending by name
      data.sort((a, b) => a.name.localeCompare(b.name));

      renderTable(data);
    }

    window.deleteRecord = async function (id, type) {
      if (!confirm("Are you sure you want to delete this record?")) return;

      const res = await fetch(`/api/admin/data/delete_${type}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id }),
      });

      if (res.ok) loadRows();
      else alert("Delete failed");
    };

    // Export to Excel
    window.exportToExcel = function () {
      const table = document.querySelector(".table-container table");
      const wb = XLSX.utils.table_to_book(table, { sheet: "GSTR4" });
      XLSX.writeFile(wb, "GSTR4_Data.xlsx");
    };

    // Import from Excel
    window.importFromExcel = async function (event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function (e) {
        try {
          const wb = XLSX.read(e.target.result, { type: "array", cellDates: true });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws);

          let imported = 0;
          for (const row of rows) {
            const payload = {
              name: row["Name"] || row["name"] || "",
              gst_no: (row["GST No"] || row["gst_no"] || "").toString().toUpperCase(),
              user_id: row["ID"] || row["user_id"] || "",
              password: row["Password"] || row["password"] || "",
              concern_person: row["Concern"] || row["concern_person"] || "",
              contact_no: row["Contact"] || row["contact_no"] || "",
              email_id: row["Email"] || row["email_id"] || "",
              periodicity: row["Periodicity"] || row["periodicity"] || "Quarterly",
            };

            if (!payload.name || !payload.gst_no) continue;

            const res = await fetch("/api/gstr4/import", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (res.ok) imported++;
          }

          alert(`Successfully imported ${imported} rows`);
          event.target.value = "";
          loadRows();
        } catch (err) {
          alert("Import failed: " + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    };

    document.getElementById("searchInput").addEventListener("input", applyFilters);
    document.getElementById("yearFilter").addEventListener("change", applyFilters);
    document.getElementById("arnFilter").addEventListener("change", applyFilters);

    window.resetFilters = async function () {
      const btn = document.getElementById("refreshBtn");
      btn.classList.add("loading");

      document.getElementById("searchInput").value = "";
      document.getElementById("yearFilter").value = "";
      document.getElementById("arnFilter").value = "";

      await loadRows();

      setTimeout(() => {
        btn.classList.remove("loading");
      }, 600);
    };

    loadRows();
  })();
</script>
