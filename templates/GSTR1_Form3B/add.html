<div class="form-wrapper">
  <div class="form-container">
    <form id="gstrForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Name</label>
          <div class="input-box">
            <i class="fas fa-user"></i>
            <input id="name" type="text" required />
          </div>
        </div>

        <div class="form-group">
          <label>GST No</label>
          <div class="input-box">
            <i class="fas fa-id-card"></i>
            <input id="gst" maxlength="15" required />
          </div>
        </div>

        <div class="form-group">
          <label>ID</label>
          <div class="input-box">
            <i class="fas fa-hashtag"></i>
            <input id="userId" type="text" required />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input id="password" type="text" required />
          </div>
        </div>

        <div class="form-group">
          <label>Concern Person</label>
          <div class="input-box">
            <i class="fas fa-user-tie"></i>
            <input id="concernPerson" required />
          </div>
        </div>

        <div class="form-group">
          <label>Contact No</label>
          <div class="input-box">
            <i class="fas fa-phone"></i>
            <input id="phone" maxlength="10" required />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input id="email" type="email" required />
          </div>
        </div>

        <div class="form-group">
          <label>Periodicity</label>
          <div class="input-box dropdown">
            <i class="fas fa-calendar"></i>
            <select id="periodicity" required>
              <option value="Monthly" selected>Monthly</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Start Month</label>
          <div class="input-box dropdown">
            <i class="fas fa-play"></i>
            <select id="startMonth" required></select>
          </div>
        </div>

        <div class="form-group">
          <label>End Month</label>
          <div class="input-box dropdown">
            <i class="fas fa-stop"></i>
            <select id="endMonth" required></select>
          </div>
        </div>
      </div>

      <button class="form-btn" type="submit">Submit</button>
    </form>
    <p id="formMessage" style="margin-top: 10px; font-weight: 600"></p>
  </div>
</div>

<style>
  /* 🔥 CENTER FULL PAGE */
  .form-wrapper {
    height: calc(10vh - 80px);
    display: flex;

    align-items: flex-start; /* 🔥 move up */
    justify-content: center;

    padding-top: -1px; /* 🔥 control exact position */
  }

  /* 🔥 CONTAINER */
  .form-container {
    width: 100%;
    max-width: 950px;

    padding: 25px;

    border-radius: 14px;

    /* GLASS EFFECT */
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(255, 255, 255, 0.25);

    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
  }

  /* GRID */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* LABEL */
  .form-group label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  /* INPUT BOX */
  .input-box {
    position: relative;
    display: flex;
    align-items: center;
    border-radius: 8px;

    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.35);

    padding-left: 35px;
  }

  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
  }
  .input-box.dropdown::after {
    transition: 0.2s;
  }

  .input-box.dropdown:focus-within::after {
    transform: rotate(180deg);
  }
  /* ICON */
  .input-box i {
    position: absolute;
    left: 10px;
    color: #6b7280;
  }

  /* INPUT + SELECT */
  .input-box input,
  .input-box select {
    width: 100%;
    padding: 10px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    color: #111; /* 🔥 important */
  }

  /* SELECT FIX */
  .input-box select {
    appearance: none;
    cursor: pointer;
  }
  /* ONLY DROPDOWN ARROW */
  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
    pointer-events: none;
    transition: 0.2s;
  }

  /* ROTATE ON FOCUS */
  .input-box.dropdown:focus-within::after {
    transform: rotate(180deg);
  }

  /* ADD ARROW ONLY WHEN SELECT EXISTS */
  .input-box:has(select)::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
    pointer-events: none;
  }
  /* FOCUS */
  .input-box:focus-within {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
  }

  /* BUTTON */
  .form-btn {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #27334d;
    color: white;
    font-weight: 600;
    width: 100px;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
  }
  .input-box select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    background: transparent;
    cursor: pointer;

    min-height: 36px; /* 🔥 important */
  }

  /* custom arrow */
  .input-box {
    position: relative;
  }
</style>

<script>
  (function () {
    const months = [
      "Mar 2026",
      "Apr 2026",
      "May 2026",
      "Jun 2026",
      "Jul 2026",
      "Aug 2026",
      "Sep 2026",
      "Oct 2026",
      "Nov 2026",
      "Dec 2026",
      "Jan 2027",
      "Feb 2027",
      "Mar 2027",
    ];

    const periodicity = document.getElementById("periodicity");
    const start = document.getElementById("startMonth");
    const end = document.getElementById("endMonth");
    const form = document.getElementById("gstrForm");
    const message = document.getElementById("formMessage");

    if (!periodicity || !start || !end || !form) return;

    // 🔥 EMAIL FORMAT FUNCTION (ONLY ADDITION)
    function formatEmail(email) {
      if (!email) return "";
      email = email.toLowerCase().trim();

      if (!email.endsWith("@gmail.com")) {
        email = email.split("@")[0] + "@gmail.com";
      }
      return email;
    }

    // default
    start.innerHTML = `<option disabled selected>Select Month</option>`;
    end.innerHTML = `<option disabled selected>Select Month</option>`;

    // fill
    months.forEach((m) => {
      start.innerHTML += `<option value="${m}">${m}</option>`;
      end.innerHTML += `<option value="${m}">${m}</option>`;
    });

    // filter end month
    start.addEventListener("change", () => {
      const startIndex = months.indexOf(start.value);

      end.innerHTML = `<option disabled selected>Select Month</option>`;

      months.forEach((m, i) => {
        if (i >= startIndex) {
          end.innerHTML += `<option value="${m}">${m}</option>`;
        }
      });
    });

    function getMonthsInRange(startMonth, endMonth) {
      const startIndex = months.indexOf(startMonth);
      const endIndex = months.indexOf(endMonth);
      if (startIndex === -1 || endIndex === -1 || endIndex < startIndex) {
        return [];
      }
      return months.slice(startIndex, endIndex + 1);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        name: document.getElementById("name").value.trim(),
        gst_no: document.getElementById("gst").value.trim().toUpperCase(),
        user_id: document.getElementById("userId").value.trim(),
        password: document.getElementById("password").value.trim(),
        concern_person: document.getElementById("concernPerson").value.trim(),
        contact_no: document.getElementById("phone").value.trim(),

        // 🔥 APPLY EMAIL FIX HERE ONLY
        email_id: formatEmail(document.getElementById("email").value),

        periodicity: periodicity.value,
        months: getMonthsInRange(start.value, end.value),
      };

      if (payload.months.length === 0) {
        alert("Select a valid month range");
        return;
      }

      if (!/^[0-9A-Z]{15}$/.test(payload.gst_no)) {
        alert("GST must be 15 uppercase alphanumeric");
        return;
      }

      const response = await fetch("/api/gstr1/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const result = await response.json();
      if (response.ok && result.success) {
        if (message) {
          message.textContent = `Saved ${payload.months.length} month entries successfully`;
          message.style.color = "#166534";
        }
        form.reset();
      } else {
        if (message) {
          message.textContent = result.error || "Failed to save";
          message.style.color = "#b91c1c";
        }
      }
    });
  })();
</script>
