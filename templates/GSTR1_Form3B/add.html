<div class="form-wrapper">
  <div class="form-container">
    <form id="gstrForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Name</label>
          <div class="input-box">
            <i class="fas fa-user"></i>
            <input id="name" type="text" required />
          </div>
        </div>

        <div class="form-group">
          <label>GST No</label>
          <div class="input-box">
            <i class="fas fa-id-card"></i>
            <input id="gst" maxlength="15" required />
          </div>
        </div>

        <div class="form-group">
          <label>ID</label>
          <div class="input-box">
            <i class="fas fa-hashtag"></i>
            <input id="userId" type="text" required />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input id="password" type="text" required />
          </div>
        </div>

        <div class="form-group">
          <label>Concern Person</label>
          <div class="input-box">
            <i class="fas fa-user-tie"></i>
            <input id="concernPerson" required />
          </div>
        </div>

        <div class="form-group">
          <label>Contact No</label>
          <div class="input-box">
            <i class="fas fa-phone"></i>
            <input id="phone" maxlength="10" required />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input id="email" type="email" required />
          </div>
        </div>

        <div class="form-group">
          <label>Periodicity</label>
          <div class="input-box dropdown">
            <i class="fas fa-calendar"></i>
            <select id="periodicity" required>
              <option value="Monthly" selected>Monthly</option>
              <option value="Quarterly">Quarterly</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Start Month (Pick any date)</label>
          <div class="input-box">
            <i class="fas fa-play"></i>
            <input type="date" id="startMonth" required style="color-scheme: dark; padding-left: 35px;" />
          </div>
        </div>

        <div class="form-group">
          <label>End Month (Pick any date)</label>
          <div class="input-box">
            <i class="fas fa-stop"></i>
            <input type="date" id="endMonth" required style="color-scheme: dark; padding-left: 35px;" />
          </div>
        </div>
      </div>

      <button class="form-btn" type="submit">Submit</button>
    </form>
    <p id="formMessage" style="margin-top: 10px; font-weight: 600"></p>
  </div>
</div>

<style>
  /* 🔥 CENTER FULL PAGE */
  .form-wrapper {
    height: calc(10vh - 80px);
    display: flex;

    align-items: flex-start; /* 🔥 move up */
    justify-content: center;

    padding-top: -1px; /* 🔥 control exact position */
  }

  /* 🔥 CONTAINER */
  .form-container {
    width: 100%;
    max-width: 950px;

    padding: 25px;

    border-radius: 14px;

    /* GLASS EFFECT */
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(255, 255, 255, 0.25);

    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
  }

  /* GRID */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* LABEL */
  .form-group label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  /* INPUT BOX */
  .input-box {
    position: relative;
    display: flex;
    align-items: center;
    border-radius: 8px;

    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.35);

    padding-left: 35px;
  }

  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
  }
  .input-box.dropdown::after {
    transition: 0.2s;
  }

  .input-box.dropdown:focus-within::after {
    transform: rotate(180deg);
  }
  /* ICON */
  .input-box i {
    position: absolute;
    left: 10px;
    color: #6b7280;
  }

  /* INPUT + SELECT */
  .input-box input,
  .input-box select {
    width: 100%;
    padding: 10px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    color: #111; /* 🔥 important */
  }

  /* SELECT FIX */
  .input-box select {
    appearance: none;
    cursor: pointer;
  }
  /* ONLY DROPDOWN ARROW */
  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
    pointer-events: none;
    transition: 0.2s;
  }

  /* ROTATE ON FOCUS */
  .input-box.dropdown:focus-within::after {
    transform: rotate(180deg);
  }

  /* ADD ARROW ONLY WHEN SELECT EXISTS */
  .input-box:has(select)::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
    color: #6b7280;
    pointer-events: none;
  }
  /* FOCUS */
  .input-box:focus-within {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
  }

  /* BUTTON */
  .form-btn {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #27334d;
    color: white;
    font-weight: 600;
    width: 100px;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
  }
  .input-box select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    background: transparent;
    cursor: pointer;

    min-height: 36px; /* 🔥 important */
  }

  /* custom arrow */
  .input-box {
    position: relative;
  }
</style>

<script>
  (async function () {
    const periodicity = document.getElementById("periodicity");
    const start = document.getElementById("startMonth");
    const end = document.getElementById("endMonth");
    const form = document.getElementById("gstrForm");
    const message = document.getElementById("formMessage");
    const gstInput = document.getElementById("gst");

    if (!periodicity || !start || !end || !form) return;

    // ── AUTO-FILL on GST number entry ──
    gstInput.addEventListener("blur", async function () {
      const gst = gstInput.value.trim().toUpperCase();
      if (!/^[0-9A-Z]{15}$/.test(gst)) return;
      gstInput.value = gst;
      try {
        const res = await fetch(`/api/gstr1/by-gst?gst_no=${encodeURIComponent(gst)}`);
        const result = await res.json();
        const row = result.data && result.data[0];
        if (!row) return;
        document.getElementById("name").value = row.name || "";
        document.getElementById("userId").value = row.user_id || "";
        document.getElementById("password").value = row.password || "";
        document.getElementById("concernPerson").value = row.concern_person || "";
        document.getElementById("phone").value = row.contact_no || "";
        document.getElementById("email").value = (row.email_id || "").toLowerCase();
        if (row.periodicity) periodicity.value = row.periodicity;
      } catch (e) {
        console.error("Auto-fill failed", e);
      }
    });

    // Fetch and restrict to Term
    try {
      const res = await fetch("/api/settings/term");
      const data = await res.json();
      const term = data.term || "2025-26";
      const parts = term.split("-");
      const y1 = parseInt(parts[0], 10);
      const y2 = parts[1].length === 2 ? 2000 + parseInt(parts[1], 10) : parseInt(parts[1], 10);
      
      const minDate = `${y1}-04-01`;
      const maxDate = `${y2}-03-31`;
      
      start.setAttribute("min", minDate);
      start.setAttribute("max", maxDate);
      end.setAttribute("min", minDate);
      end.setAttribute("max", maxDate);
    } catch (e) {
      console.error("Failed to fetch term limits");
    }

    // 🔥 EMAIL FORMAT FUNCTION (ONLY ADDITION)
    function formatEmail(email) {
      if (!email) return "";
      email = email.toLowerCase().trim();

      if (!email.endsWith("@gmail.com")) {
        email = email.split("@")[0] + "@gmail.com";
      }
      return email;
    }

    start.addEventListener("change", () => {
      // Ensure end month is at least start month
      if (start.value && (!end.value || end.value < start.value)) {
        end.value = start.value;
        end.min = start.value;
      } else if (start.value) {
        end.min = start.value;
      }
    });

    function getMonthsInRange(startVal, endVal) {
      if (!startVal || !endVal) return [];
      const d1 = new Date(startVal);
      const d2 = new Date(endVal);
      if (d2 < d1) return [];
      
      const result = [];
      let current = new Date(d1.getFullYear(), d1.getMonth(), 1);
      const endMarker = new Date(d2.getFullYear(), d2.getMonth(), 1);
      
      const monthsStr = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      
      while (current <= endMarker) {
        result.push(`${monthsStr[current.getMonth()]} ${current.getFullYear()}`);
        current.setMonth(current.getMonth() + 1);
      }
      return result;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        name: document.getElementById("name").value.trim(),
        gst_no: document.getElementById("gst").value.trim().toUpperCase(),
        user_id: document.getElementById("userId").value.trim(),
        password: document.getElementById("password").value.trim(),
        concern_person: document.getElementById("concernPerson").value.trim(),
        contact_no: document.getElementById("phone").value.trim(),

        // 🔥 APPLY EMAIL FIX HERE ONLY
        email_id: formatEmail(document.getElementById("email").value),

        periodicity: periodicity.value,
        months: getMonthsInRange(start.value, end.value),
      };

      if (payload.months.length === 0) {
        alert("Select a valid month range");
        return;
      }

      if (!/^[0-9A-Z]{15}$/.test(payload.gst_no)) {
        alert("GST must be 15 uppercase alphanumeric");
        return;
      }

      const response = await fetch("/api/gstr1/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const result = await response.json();
      if (response.ok && result.success) {
        if (message) {
          message.textContent = `Saved ${payload.months.length} month entries successfully`;
          message.style.color = "#166534";
        }
        form.reset();
      } else {
        if (message) {
          message.textContent = result.error || "Failed to save";
          message.style.color = "#b91c1c";
        }
      }
    });
  })();
</script>
