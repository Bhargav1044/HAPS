<div class="form-wrapper">
  <!-- HEADER -->
  <div class="table-header">
    <h2>GSTR1 & Form 3B ARN</h2>

    <div class="header-actions">
      <input type="text" id="searchInput" placeholder="Search..." />
      <button onclick="resetFilters()">
        <i class="fas fa-rotate"></i>
      </button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-box">
    <!-- GST FILTER (TOGGLE STYLE) -->
    <div class="gst-filter">
      <button class="filter-btn active" data-value="">All</button>
      <button class="filter-btn" data-value="empty">GST Empty</button>
    </div>

    <!-- RANGE SLIDER -->
    <div class="range-box">
      <label>Month Range</label>
      <input type="range" id="startRange" min="0" max="12" value="0" />
      <input type="range" id="endRange" min="0" max="12" value="12" />
      <div class="range-label" id="rangeLabel"></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GST No</th>
          <th>ID</th>
          <th>Password</th>
          <th>Concern</th>
          <th>Contact</th>
          <th>Email</th>
          <th>Periodicity</th>
          <th>Month</th>
          <th>GSTR1 ARN</th>
          <th>GSTR1 Date</th>
          <th>Form 3B ARN</th>
          <th>Form 3B Date</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <tr>
          <td colspan="13" class="loading">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<style>
  /* ===== WRAPPER ===== */
  .form-wrapper {
    padding: 15px;
  }

  /* HEADER */
  .table-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .table-header h2 {
    font-size: 20px;
    font-weight: 700;
  }

  /* SEARCH */
  .header-actions {
    display: flex;
    gap: 10px;
  }

  .header-actions input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    width: 240px;
  }

  .header-actions button {
    background: #27334d;
    color: white;
    border-radius: 10px;
    border: none;
    padding: 10px;
  }

  /* ===== FILTERS ===== */
  .filter-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  /* GST BUTTON FILTER */
  .gst-filter {
    display: flex;
    gap: 10px;
  }

  .filter-btn {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #cbd5e1;
    background: white;
    cursor: pointer;
  }

  .filter-btn.active {
    background: #27334d;
    color: white;
    border: none;
  }

  /* RANGE */
  .range-box {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .range-box input {
    width: 250px;
  }

  .range-label {
    font-size: 12px;
    font-weight: 600;
    color: #27334d;
  }

  /* ===== TABLE ===== */
  .table-container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    border-radius: 16px;

    max-height: 400px; /* 🔥 vertical scroll */
    overflow-y: auto;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  /* HEADER */
  th {
    position: sticky;
    top: 0;

    background: rgba(255, 255, 255, 0.9);
    color: #27334d;
    font-weight: 700;
    padding: 12px;
  }

  /* ROW */
  td {
    padding: 10px;
  }

  /* HOVER */
  tr:hover {
    background: rgba(37, 99, 235, 0.08);
  }

  .loading {
    text-align: center;
  }
</style>

<script>
  (function () {
    const months = [
      "Mar 2026",
      "Apr 2026",
      "May 2026",
      "Jun 2026",
      "Jul 2026",
      "Aug 2026",
      "Sep 2026",
      "Oct 2026",
      "Nov 2026",
      "Dec 2026",
      "Jan 2027",
      "Feb 2027",
      "Mar 2027",
    ];

    let data = [];

    let gstFilterValue = "";

    /* ELEMENTS */
    const startRange = document.getElementById("startRange");
    const endRange = document.getElementById("endRange");
    const label = document.getElementById("rangeLabel");

    /* LABEL */
    function updateLabel() {
      label.innerText = `${months[startRange.value]} → ${months[endRange.value]}`;
    }

    /* GST BUTTON FILTER */
    document.querySelectorAll(".filter-btn").forEach((btn) => {
      btn.onclick = () => {
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        gstFilterValue = btn.dataset.value;
        applyFilters();
      };
    });

    /* FILTER */
    function applyFilters() {
      let filtered = [...data];
      const search = document.getElementById("searchInput").value.toLowerCase();

      if (gstFilterValue === "empty") {
        filtered = filtered.filter((d) => !d.gst);
      }

      filtered = filtered.filter((d) => {
        const idx = months.indexOf(d.month);
        return idx >= startRange.value && idx <= endRange.value;
      });

      if (search) {
        filtered = filtered.filter((d) =>
          Object.values(d).join(" ").toLowerCase().includes(search),
        );
      }

      renderTable(filtered);
    }

    /* TABLE */
    function renderTable(rows) {
      const body = document.getElementById("tableBody");

      if (rows.length === 0) {
        body.innerHTML = `<tr><td colspan="13">No Data Found</td></tr>`;
        return;
      }

      body.innerHTML = rows
        .map(
          (r) => `
    <tr>
      <td>${r.name}</td>
      <td>${r.gst || "-"}</td>
      <td>${r.id}</td><td>${r.password}</td><td>${r.concern}</td><td>${r.contact}</td>
      <td>${r.email}</td><td>${r.periodicity}</td>
      <td>${r.month}</td>
      <td>${r.gstr1Arn}</td><td>${r.gstr1Date}</td><td>${r.form3bArn}</td><td>${r.form3bDate}</td>
      ${window.isAdmin ? `<td><button style="background: #e11d48; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;" onclick="deleteRecord('${r.db_id}', 'gstr1')">Delete</button></td>` : ''}
    </tr>
  `,
        )
        .join("");
    }

    async function loadRows() {
      if (window.isAdmin && !document.getElementById("actionTh")) {
        const theadTr = document.querySelector("table thead tr");
        if (theadTr) theadTr.innerHTML += '<th id="actionTh">Action</th>';
      }
      const response = await fetch("/api/gstr1/list");
      const result = await response.json();
      data = (result.data || []).map((row) => ({
        db_id: row.id,
        name: row.name || "-",
        gst: row.gst_no || "",
        id: row.user_id || "-",
        password: row.password || "-",
        concern: row.concern_person || "-",
        contact: row.contact_no || "-",
        email: row.email_id || "-",
        periodicity: row.periodicity || "-",
        month: row.month || "-",
        gstr1Arn: row.gstr1_arn_no || "-",
        gstr1Date: row.gstr1_filing_date || "-",
        form3bArn: row.form3b_arn_no || "-",
        form3bDate: row.form3b_filing_date || "-",
      }));
      renderTable(data);
    }

    window.deleteRecord = async function(id, type) {
      if (!confirm("Are you sure you want to delete this record?")) return;
      const res = await fetch(`/api/admin/data/delete_${type}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
      });
      if (res.ok) {
        loadRows();
      } else {
        alert("Failed to delete record");
      }
    };

    /* EVENTS */
    startRange.oninput = () => {
      updateLabel();
      applyFilters();
    };
    endRange.oninput = () => {
      updateLabel();
      applyFilters();
    };

    document
      .getElementById("searchInput")
      .addEventListener("input", applyFilters);

    /* RESET */
    window.resetFilters = function () {
      startRange.value = 0;
      endRange.value = 12;
      gstFilterValue = "";
      document
        .querySelectorAll(".filter-btn")
        .forEach((b) => b.classList.remove("active"));
      document
        .querySelector(".filter-btn[data-value='']")
        .classList.add("active");
      document.getElementById("searchInput").value = "";
      updateLabel();
      loadRows();
    };

    /* INIT */
    updateLabel();
    loadRows();
  })();
</script>
