<div class="form-wrapper">
  <!-- HEADER -->
  <div class="table-header">
    <h2>GSTR1 & Form 3B ARN</h2>

    <div class="header-actions">
      <input type="text" id="searchInput" placeholder="Search..." />
      <button id="refreshBtn" onclick="resetFilters()">
        <i class="fas fa-rotate"></i>
      </button>
    </div>
  </div>

  <!-- 🔥 SINGLE LINE FILTER BAR -->
  <div class="filter-bar">
    <!-- GSTR1 FILTER -->
    <div class="filter-group">
      <label>GSTR1 Status</label>
      <select id="g1Filter">
        <option value="">All</option>
        <option value="filled">Filled</option>
        <option value="empty">Empty</option>
      </select>
    </div>

    <!-- FORM 3B FILTER -->
    <div class="filter-group">
      <label>Form 3B Status</label>
      <select id="f3bFilter">
        <option value="">All</option>
        <option value="filled">Filled</option>
        <option value="empty">Empty</option>
      </select>
    </div>

    <!-- RANGE -->
    <div class="range-inline">
      <label>Month Range</label>
      <input type="range" id="startRange" min="0" max="12" value="0" />
      <input type="range" id="endRange" min="0" max="12" value="12" />
      <span id="rangeLabel"></span>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GST No</th>
          <th>ID</th>
          <th>Password</th>
          <th>Concern</th>
          <th>Contact</th>
          <th>Email</th>
          <th>Periodicity</th>
          <th>Month</th>
          <th>GSTR1 ARN</th>
          <th>GSTR1 Date</th>
          <th>Form 3B ARN</th>
          <th>Form 3B Date</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <tr>
          <td colspan="13" class="loading">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<style>
  .form-wrapper {
    padding: 15px;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .header-actions input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
  }

  .header-actions button {
    background: #27334d;
    color: white;
    border-radius: 10px;
    border: none;
    padding: 10px;
    cursor: pointer;
  }

  /* 🔥 REFRESH ANIMATION */
  #refreshBtn i {
    transition: transform 0.5s ease;
  }

  #refreshBtn.loading i {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }

  /* 🔥 FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 25px;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    font-size: 13px;
  }

  .filter-group select {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    min-width: 150px;
  }

  .range-inline {
    display: flex;
    flex-direction: column;
    font-size: 13px;
  }

  .range-inline input {
    width: 200px;
  }

  #rangeLabel {
    font-size: 12px;
    font-weight: 600;
  }

  .table-container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    border-radius: 16px;
    max-height: 420px;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    position: sticky;
    top: 0;
    background: rgba(255, 255, 255, 0.95);
    padding: 12px;
  }

  td {
    padding: 10px;
  }

  tr:hover {
    background: rgba(37, 99, 235, 0.08);
  }

  .null {
    background: #e11d48;
    color: white;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
  }
</style>

<script>
  (function () {
    const months = [
      "Mar 2026",
      "Apr 2026",
      "May 2026",
      "Jun 2026",
      "Jul 2026",
      "Aug 2026",
      "Sep 2026",
      "Oct 2026",
      "Nov 2026",
      "Dec 2026",
      "Jan 2027",
      "Feb 2027",
      "Mar 2027",
    ];

    let data = [];

    const startRange = document.getElementById("startRange");
    const endRange = document.getElementById("endRange");
    const label = document.getElementById("rangeLabel");

    function updateLabel() {
      label.innerText = `${months[startRange.value]} → ${months[endRange.value]}`;
    }

    function applyFilters() {
      let filtered = [...data];

      const search = document.getElementById("searchInput").value.toLowerCase();
      const g1 = document.getElementById("g1Filter").value;
      const f3b = document.getElementById("f3bFilter").value;

      if (g1 === "empty")
        filtered = filtered.filter((d) => !d.gstr1Arn || !d.gstr1Date);
      if (g1 === "filled")
        filtered = filtered.filter((d) => d.gstr1Arn && d.gstr1Date);

      if (f3b === "empty")
        filtered = filtered.filter((d) => !d.form3bArn || !d.form3bDate);
      if (f3b === "filled")
        filtered = filtered.filter((d) => d.form3bArn && d.form3bDate);

      filtered = filtered.filter((d) => {
        const idx = months.indexOf(d.month);
        return idx >= startRange.value && idx <= endRange.value;
      });

      if (search) {
        filtered = filtered.filter((d) =>
          Object.values(d).join(" ").toLowerCase().includes(search),
        );
      }

      renderTable(filtered);
    }

    function renderTable(rows) {
      const body = document.getElementById("tableBody");

      if (rows.length === 0) {
        body.innerHTML = `<tr><td colspan="13">No Data Found</td></tr>`;
        return;
      }

      body.innerHTML = rows
        .map(
          (r) => `
        <tr>
          <td>${r.name}</td>
          <td>${r.gst || "-"}</td>
          <td>${r.id}</td>
          <td>${r.password}</td>
          <td>${r.concern}</td>
          <td>${r.contact}</td>
          <td>${r.email}</td>
          <td>${r.periodicity}</td>
          <td>${r.month}</td>
          <td>${r.gstr1Arn ? r.gstr1Arn : '<span class="null">NULL</span>'}</td>
          <td>${r.gstr1Date ? r.gstr1Date : '<span class="null">NULL</span>'}</td>
          <td>${r.form3bArn ? r.form3bArn : '<span class="null">NULL</span>'}</td>
          <td>${r.form3bDate ? r.form3bDate : '<span class="null">NULL</span>'}</td>
        </tr>
      `,
        )
        .join("");
    }

    async function loadRows() {
      const response = await fetch("/api/gstr1/list");
      const result = await response.json();

      data = (result.data || []).map((row) => ({
        name: row.name || "-",
        gst: row.gst_no || "",
        id: row.user_id || "-",
        password: row.password || "-",
        concern: row.concern_person || "-",
        contact: row.contact_no || "-",
        email: row.email_id || "-",
        periodicity: row.periodicity || "-",
        month: row.month || "",
        gstr1Arn: row.gstr1_arn_no || "",
        gstr1Date: row.gstr1_filing_date || "",
        form3bArn: row.form3b_arn_no || "",
        form3bDate: row.form3b_filing_date || "",
      }));

      renderTable(data);
    }

    startRange.oninput = () => {
      updateLabel();
      applyFilters();
    };
    endRange.oninput = () => {
      updateLabel();
      applyFilters();
    };

    document
      .getElementById("searchInput")
      .addEventListener("input", applyFilters);
    document
      .getElementById("g1Filter")
      .addEventListener("change", applyFilters);
    document
      .getElementById("f3bFilter")
      .addEventListener("change", applyFilters);

    window.resetFilters = async function () {
      const btn = document.getElementById("refreshBtn");

      btn.classList.add("loading"); // 🔥 start animation

      document.getElementById("searchInput").value = "";
      document.getElementById("g1Filter").value = "";
      document.getElementById("f3bFilter").value = "";
      startRange.value = 0;
      endRange.value = 12;

      updateLabel();
      await loadRows();

      setTimeout(() => {
        btn.classList.remove("loading"); // 🔥 stop animation
      }, 600);
    };

    updateLabel();
    loadRows();
  })();
</script>
