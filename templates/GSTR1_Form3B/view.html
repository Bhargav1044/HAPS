<div class="form-wrapper">
  <!-- HEADER -->
  <div class="table-header">
    <h2>GSTR1 & Form 3B ARN</h2>

    <div class="header-actions">
      <input type="text" id="searchInput" placeholder="Search..." />
      <button id="refreshBtn" onclick="resetFilters()">
        <i class="fas fa-rotate"></i>
      </button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <!-- GSTR1 FILTER -->
    <div class="filter-group">
      <label>GSTR1 Status</label>
      <select id="g1Filter">
        <option value="">All</option>
        <option value="filled">Filled</option>
        <option value="empty">Empty</option>
      </select>
    </div>

    <!-- FORM 3B FILTER -->
    <div class="filter-group">
      <label>Form 3B Status</label>
      <select id="f3bFilter">
        <option value="">All</option>
        <option value="filled">Filled</option>
        <option value="empty">Empty</option>
      </select>
    </div>

    <!-- MONTH DROPDOWN -->
    <div class="filter-group">
      <label>Month</label>
      <select id="monthFilter">
        <option value="">All</option>
      </select>
    </div>
  </div>

  <!-- EXPORT / IMPORT BAR -->
  <div class="action-bar">
    <button class="action-btn export-btn" onclick="exportToExcel()">
      <i class="fas fa-file-excel"></i> Export to Excel
    </button>
    <button class="action-btn import-btn" onclick="document.getElementById('importFile').click()">
      <i class="fas fa-upload"></i> Import Excel
    </button>
    <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none" onchange="importFromExcel(event)" />
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GST No.</th>
          <th>ID</th>
          <th>Password</th>
          <th>Concern Person</th>
          <th>Contact No.</th>
          <th>Email ID</th>
          <th>Periodicity</th>
          <th>Month</th>
          <th>GSTR1 ARN</th>
          <th>GSTR1 Date</th>
          <th>Form 3B ARN</th>
          <th>Form 3B Date</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <tr>
          <td colspan="13" class="loading">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<style>
  .form-wrapper {
    padding: 15px;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .header-actions input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
  }

  .header-actions button {
    background: #27334d;
    color: white;
    border-radius: 10px;
    border: none;
    padding: 10px;
    cursor: pointer;
  }

  #refreshBtn i {
    transition: transform 0.5s ease;
  }

  #refreshBtn.loading i {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .filter-bar {
    display: flex;
    gap: 25px;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    font-size: 13px;
  }

  .filter-group select {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    min-width: 150px;
  }

  /* ACTION BAR */
  .action-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .action-btn:hover {
    opacity: 0.85;
  }

  .export-btn {
    background: #16a34a;
    color: white;
  }

  .import-btn {
    background: #2563eb;
    color: white;
  }

  .table-container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    border-radius: 16px;
    max-height: 420px;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    position: sticky;
    top: 0;
    background: rgba(255, 255, 255, 0.95);
    padding: 12px;
  }

  td {
    padding: 10px;
  }

  tr:hover {
    background: rgba(37, 99, 235, 0.08);
  }

  .null {
    background: #e11d48;
    color: white;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
  }
</style>

<!-- SheetJS for Excel export/import -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<script>
  (function () {
    // Dynamic FY months: Apr {year} → Mar {year+1}
    function generateMonths() {
      const now = new Date();
      let fy = now.getFullYear();
      if (now.getMonth() < 3) fy--; // Jan-Mar → previous FY
      const m = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
      return m.map((name, i) => {
        const yr = i < 9 ? fy : fy + 1;
        return `${name} ${yr}`;
      });
    }

    const months = generateMonths();
    let data = [];

    // Populate month dropdown
    const monthFilter = document.getElementById("monthFilter");
    months.forEach(m => {
      monthFilter.innerHTML += `<option value="${m}">${m}</option>`;
    });

    // Month sort helper
    function monthIndex(m) {
      const idx = months.indexOf(m);
      return idx === -1 ? 999 : idx;
    }

    function applyFilters() {
      let filtered = [...data];

      const search = document.getElementById("searchInput").value.toLowerCase();
      const g1 = document.getElementById("g1Filter").value;
      const f3b = document.getElementById("f3bFilter").value;
      const selMonth = document.getElementById("monthFilter").value;

      if (g1 === "empty")
        filtered = filtered.filter((d) => !d.gstr1Arn || !d.gstr1Date);
      if (g1 === "filled")
        filtered = filtered.filter((d) => d.gstr1Arn && d.gstr1Date);

      if (f3b === "empty")
        filtered = filtered.filter((d) => !d.form3bArn || !d.form3bDate);
      if (f3b === "filled")
        filtered = filtered.filter((d) => d.form3bArn && d.form3bDate);

      if (selMonth) {
        filtered = filtered.filter((d) => d.month === selMonth);
      }

      if (search) {
        filtered = filtered.filter((d) =>
          Object.values(d).join(" ").toLowerCase().includes(search),
        );
      }

      renderTable(filtered);
    }

    function renderTable(rows) {
      const body = document.getElementById("tableBody");

      if (rows.length === 0) {
        body.innerHTML = `<tr><td colspan="14">No Data Found</td></tr>`;
        return;
      }

      body.innerHTML = rows
        .map(
          (r) => `
        <tr>
          <td>${r.name}</td>
          <td>${r.gst || "-"}</td>
          <td>${r.id}</td>
          <td>${r.password}</td>
          <td>${r.concern}</td>
          <td>${r.contact}</td>
          <td>${r.email}</td>
          <td>${r.periodicity}</td>
          <td>${r.month}</td>
          <td>${r.gstr1Arn ? r.gstr1Arn : '<span class="null">NULL</span>'}</td>
          <td>${r.gstr1Date ? r.gstr1Date : '<span class="null">NULL</span>'}</td>
          <td>${r.form3bArn ? r.form3bArn : '<span class="null">NULL</span>'}</td>
          <td>${r.form3bDate ? r.form3bDate : '<span class="null">NULL</span>'}</td>
          ${
            window.isAdmin
              ? `<td><button style="background:#e11d48;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;" onclick="deleteRecord('${r.db_id}','gstr1')">Delete</button></td>`
              : ""
          }
        </tr>
      `,
        )
        .join("");
    }

    async function loadRows() {
      // Add Action column for admin
      if (window.isAdmin && !document.getElementById("actionTh")) {
        const theadTr = document.querySelector("table thead tr");
        if (theadTr) theadTr.innerHTML += '<th id="actionTh">Action</th>';
      }

      const response = await fetch("/api/gstr1/list");
      const result = await response.json();

      data = (result.data || []).map((row) => ({
        db_id: row.id,
        name: row.name || "-",
        gst: row.gst_no || "",
        id: row.user_id || "-",
        password: row.password || "-",
        concern: row.concern_person || "-",
        contact: row.contact_no || "-",
        email: row.email_id || "-",
        periodicity: row.periodicity || "-",
        month: row.month || "",
        gstr1Arn: row.gstr1_arn_no || "",
        gstr1Date: row.gstr1_filing_date || "",
        form3bArn: row.form3b_arn_no || "",
        form3bDate: row.form3b_filing_date || "",
      }));

      // Sort ascending by month
      data.sort((a, b) => monthIndex(a.month) - monthIndex(b.month));

      renderTable(data);
    }

    // Delete (admin only)
    window.deleteRecord = async function (id, type) {
      if (!confirm("Are you sure you want to delete this record?")) return;

      const res = await fetch(`/api/admin/data/delete_${type}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id }),
      });

      if (res.ok) loadRows();
      else alert("Delete failed");
    };

    // Export to Excel
    window.exportToExcel = function () {
      const table = document.querySelector(".table-container table");
      const wb = XLSX.utils.table_to_book(table, { sheet: "GSTR1_Form3B" });
      XLSX.writeFile(wb, "GSTR1_Form3B_Data.xlsx");
    };

    // Import from Excel
    window.importFromExcel = async function (event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function (e) {
        try {
          const wb = XLSX.read(e.target.result, { type: "array", cellDates: true });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws);

          const formatMonth = (val) => {
            if (!val) return "";
            if (val instanceof Date) {
              const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
              return `${m[val.getMonth()]} ${val.getFullYear()}`;
            }
            if (typeof val === 'string' && val.includes('/')) {
              // Try parsing DD/MM/YY or MM/DD/YY
              // In JS Date, "4/1/2026" parses as April 1.
              const parts = val.split(/[/-]/);
              let d;
              // If DD/MM/YYYY is meant (e.g. 15/04/2026) we check if parts[0] is > 12 to guess format
              if (parts.length === 3) {
                 const p0 = parseInt(parts[0], 10);
                 const p1 = parseInt(parts[1], 10);
                 const p2 = parseInt(parts[2], 10);
                 const year = p2 < 100 ? 2000 + p2 : p2; // handle YY
                 if (p0 > 12) {
                   d = new Date(year, p1 - 1, p0); // DD/MM/YY
                 } else {
                   d = new Date(year, p0 - 1, p1); // MM/DD/YY (US standard, fallback)
                 }
              } else {
                 d = new Date(val); 
              }
              
              if (d && !isNaN(d.getTime())) {
                const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                return `${m[d.getMonth()]} ${d.getFullYear()}`;
              }
            }
            return String(val);
          };

          let imported = 0;
          for (const row of rows) {
            const rawMonth = row["Month"] || row["month"] || "";
            const payload = {
              name: row["Name"] || row["name"] || "",
              gst_no: (row["GST No"] || row["gst_no"] || "").toString().toUpperCase(),
              user_id: row["ID"] || row["user_id"] || "",
              password: row["Password"] || row["password"] || "",
              concern_person: row["Concern"] || row["concern_person"] || "",
              contact_no: row["Contact"] || row["contact_no"] || "",
              email_id: row["Email"] || row["email_id"] || "",
              periodicity: row["Periodicity"] || row["periodicity"] || "Monthly",
              month: formatMonth(rawMonth),
            };

            if (!payload.name || !payload.gst_no) continue;

            const res = await fetch("/api/gstr1/add", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (res.ok) imported++;
          }

          alert(`Successfully imported ${imported} rows`);
          event.target.value = "";
          loadRows();
        } catch (err) {
          alert("Import failed: " + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    };

    document.getElementById("searchInput").addEventListener("input", applyFilters);
    document.getElementById("g1Filter").addEventListener("change", applyFilters);
    document.getElementById("f3bFilter").addEventListener("change", applyFilters);
    document.getElementById("monthFilter").addEventListener("change", applyFilters);

    window.resetFilters = async function () {
      const btn = document.getElementById("refreshBtn");
      btn.classList.add("loading");

      document.getElementById("searchInput").value = "";
      document.getElementById("g1Filter").value = "";
      document.getElementById("f3bFilter").value = "";
      document.getElementById("monthFilter").value = "";

      await loadRows();

      setTimeout(() => {
        btn.classList.remove("loading");
      }, 600);
    };

    loadRows();
  })();
</script>
