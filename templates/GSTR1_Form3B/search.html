<div class="form-wrapper">
  <!-- 🔍 TOP SEARCH BAR -->
  <div class="top-search">
    <input id="gstSearch" placeholder="Enter GST No to Login Portal" />
    <button onclick="openGST()">
      <i class="fas fa-search"></i>
    </button>
  </div>

  <!-- FORM -->
  <div class="form-container">
    <form id="updateForm">
      <div class="form-grid">
        <!-- NAME -->
        <div class="form-group">
          <label>Name</label>
          <div class="input-box">
            <i class="fas fa-user"></i>
            <input id="name" type="text" required />
          </div>
        </div>

        <!-- GST -->
        <div class="form-group">
          <label>GST No.</label>
          <div class="input-box">
            <i class="fas fa-id-card"></i>
            <input id="gst" maxlength="15" required pattern="[0-9A-Z]{15}" />
          </div>
        </div>

        <!-- ID -->
        <div class="form-group">
          <label>ID</label>
          <div class="input-box">
            <i class="fas fa-hashtag"></i>
            <input id="userId" type="text" required />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input id="password" type="text" required />
          </div>
        </div>

        <!-- CONCERN -->
        <div class="form-group">
          <label>Concern Person</label>
          <div class="input-box">
            <i class="fas fa-user-tie"></i>
            <input id="concernPerson" required />
          </div>
        </div>

        <!-- CONTACT -->
        <div class="form-group">
          <label>Contact No.</label>
          <div class="input-box">
            <i class="fas fa-phone"></i>
            <input id="contactNo" maxlength="10" pattern="[0-9]{10}" required />
          </div>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email ID</label>
          <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input id="emailId" type="email" required />
          </div>
        </div>

        <!-- PERIODICITY -->
        <div class="form-group">
          <label>Periodicity</label>
          <div class="input-box dropdown">
            <i class="fas fa-calendar"></i>
            <select id="periodicity" required>
              <option value="Monthly">Monthly</option>
              <option value="Quarterly">Quarterly</option>
            </select>
          </div>
        </div>

        <!-- MONTH -->
        <div class="form-group">
          <label>Month</label>
          <div class="input-box dropdown">
            <i class="fas fa-calendar-alt"></i>
            <select id="monthList" required></select>
          </div>
        </div>
      </div>

      <button class="form-btn" type="submit">Update</button>
    </form>
    <p id="searchMessage" style="margin-top: 10px; font-weight: 600"></p>
  </div>
</div>

<style>
  /* ===== WRAPPER ===== */
  .form-wrapper {
    padding: 20px;
  }

  /* 🔍 TOP SEARCH */
  .top-search {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 15px;
    gap: 10px;
  }

  .top-search input {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    width: 260px;
  }

  .top-search button {
    background: #27334d;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 10px;
  }

  /* ===== CONTAINER ===== */
  .form-container {
    max-width: 900px;
    margin: auto;
    padding: 25px;

    border-radius: 14px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(255, 255, 255, 0.25);
  }

  /* GRID */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* LABEL */
  .form-group label {
    font-size: 12px;
    font-weight: 600;
  }

  /* INPUT BOX */
  .input-box {
    position: relative;
    display: flex;
    align-items: center;

    border-radius: 8px;
    padding-left: 35px;

    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.35);
  }

  /* ICON */
  .input-box i {
    position: absolute;
    left: 10px;
    color: #6b7280;
  }

  /* INPUT */
  .input-box input,
  .input-box select {
    width: 100%;
    padding: 10px;
    border: none;
    outline: none;
    background: transparent;
  }

  /* DROPDOWN ARROW */
  .input-box.dropdown::after {
    content: "▼";
    position: absolute;
    right: 10px;
    font-size: 10px;
  }

  /* BUTTON */
  .form-btn {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #27334d;
    color: white;
    font-weight: 600;
    width: 120px;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  (function () {
    const months = [
      "Mar 2026",
      "Apr 2026",
      "May 2026",
      "Jun 2026",
      "Jul 2026",
      "Aug 2026",
      "Sep 2026",
      "Oct 2026",
      "Nov 2026",
      "Dec 2026",
      "Jan 2027",
      "Feb 2027",
      "Mar 2027",
    ];

    const monthList = document.getElementById("monthList");
    const form = document.getElementById("updateForm");
    const message = document.getElementById("searchMessage");
    const periodicitySelect = document.getElementById("periodicity");

    if (!form) return;

    /* ✅ FIXED OPTION RENDERING */
    monthList.innerHTML = `<option disabled selected>Select Month</option>`;
    months.forEach((m) => {
      monthList.innerHTML += `<option value="${m}">${m}</option>`;
    });

    /* ✅ FORM SUBMIT */
    document
      .getElementById("updateForm")
      .addEventListener("submit", async function (e) {
        e.preventDefault();
        const gst = document.getElementById("gst").value.trim().toUpperCase();

        if (!/^[0-9A-Z]{15}$/.test(gst)) {
          alert("GST must be 15 uppercase alphanumeric");
          return;
        }

        /* ✅ EMAIL FIX */
        let emailInput = document.getElementById("emailId");
        let email = emailInput.value.trim().toLowerCase();

        if (!email.endsWith("@gmail.com")) {
          alert("Email must be a valid @gmail.com address");
          return;
        }

        emailInput.value = email;

        const response = await fetch("/api/gstr1/update-profile", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value.trim(),
            gst_no: gst,
            user_id: document.getElementById("userId").value.trim(),
            password: document.getElementById("password").value.trim(),
            concern_person: document
              .getElementById("concernPerson")
              .value.trim(),
            contact_no: document.getElementById("contactNo").value.trim(),
            email_id: email,
            periodicity: periodicitySelect.value,
            month: monthList.value,
          }),
        });

        const result = await response.json();
        if (response.ok && result.success) {
          if (message) {
            message.textContent = "Updated successfully";
            message.style.color = "#166534";
          }
        } else if (message) {
          message.textContent = result.error || "Update failed";
          message.style.color = "#b91c1c";
        }
      });

    /* 🔥 GST SEARCH (AUTO FILL) */
    window.openGST = async function () {
      const gst = document
        .getElementById("gstSearch")
        .value.trim()
        .toUpperCase();

      if (!/^[0-9A-Z]{15}$/.test(gst)) {
        alert("Enter valid GST number");
        return;
      }

      const response = await fetch(
        `/api/gstr1/by-gst?gst_no=${encodeURIComponent(gst)}`,
      );

      const result = await response.json();
      const row = result.data && result.data[0];

      if (!response.ok || !result.success || !row) {
        alert("No record found for this GST");
        return;
      }

      /* ✅ AUTO FILL */
      document.getElementById("gst").value = row.gst_no || "";
      document.getElementById("name").value = row.name || "";
      document.getElementById("userId").value = row.user_id || "";
      document.getElementById("password").value = row.password || "";
      document.getElementById("concernPerson").value = row.concern_person || "";
      document.getElementById("contactNo").value = row.contact_no || "";
      document.getElementById("emailId").value = (
        row.email_id || ""
      ).toLowerCase();
      if (row.periodicity) periodicitySelect.value = row.periodicity;

      if (row.month) {
        monthList.value = row.month;
      }
    };
  })();
</script>
